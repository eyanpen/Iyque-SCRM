#user  nobody;
worker_processes 1;

#error_log  logs/error.log;
#error_log  logs/error.log  notice;
#error_log  logs/error.log  info;

#pid        logs/nginx.pid;
events {
	worker_connections 1024;
}


http {
	include mime.types;
	default_type application/octet-stream;

	sendfile on;
	keepalive_timeout 65;
	client_max_body_size 20M;
	client_body_buffer_size 20M;
	proxy_buffer_size 4k;
	proxy_buffering on;
	proxy_buffers 4 1024k;
	proxy_busy_buffers_size 1024k;
	proxy_max_temp_file_size 1024m;

	client_header_buffer_size 16k;
	large_client_header_buffers 4 16k;

	gzip on;
	gzip_types text/plain application/javascript application/x-javascript text/css application/xml text/javascript application/x-httpd-php image/jpeg image/gif image/png;
	gzip_disable "MSIE [1-6]\.";
	gzip_min_length 10k;
	gzip_buffers 4 16k;
	gzip_comp_level 3;

	limit_conn_zone $binary_remote_addr zone=addr_zone:10m;

	map $http_upgrade $connection_upgrade {
		default upgrade;
		'' close;
	}


	# 护城河 SCRM · 演示环境（HTTP 直连 10.210.156.69）
	server {
		listen 80;
		server_name 10.210.156.69;

		# 限制并发连接数为 10
		limit_conn addr_zone 10;

		# 后端 iyque API 反向代理
		location ^~ /iyque/ {
			proxy_pass http://127.0.0.1:8085/;
		}

		# PC 前端
		location /tools {
			root /usr/local/nginx/html/prod;
			index index.html index.htm;
			try_files $uri $uri/ /tools/index.html;
			proxy_read_timeout 150;

			# 处理跨域
			add_header Access-Control-Allow-Origin '*' always;
			add_header Access-Control-Allow-Methods '*';
			if ($request_method = 'OPTIONS') {
				return 204;
			}
		}

		# 移动端前端
		location /openmobile {
			alias /usr/local/nginx/html/prod/openmobile;
			try_files $uri $uri/ /openmobile/index.html;
			index index.html;
		}
	}

}
