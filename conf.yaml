# =============================================================================
# 源雀 SCRM (Iyque-SCRM) 安装配置文件
# =============================================================================
# 用途：集中收集部署本项目所需的全部信息。
#   - 已填写：本次你已提供的值
#   - 待提供：标记为 "<请提供: ...>" 的项，请补全后再执行安装
# 说明：本文件对应后端 src/main/resources/application.yml 中的配置项。
# =============================================================================

# ------------------------------------------------------------------ 后端服务
server:
  port: 8085                     # 后端监听端口（默认 8085，可保持）

# ------------------------------------------------------------------ MySQL 业务数据库
# 注意：应用 ddl-auto=none，不会自动建表，需先导入官方初始化 SQL 后再启动。
mysql:
  host: localhost                # ✅ 已提供
  port: 3306                     # ✅ 已提供
  database: scrm_ky              # 数据库名（默认 scrm_ky，可修改）
  user: eyanpen                  # ✅ 已提供
  password: okswordsman          # ✅ 已提供

# ------------------------------------------------------------------ Redis 缓存 / 限流
# 你提供的 falkordb 端点：10.156.133.79:30869/TCP
# 说明：FalkorDB 基于 Redis 协议，可作为本项目的 Redis 后端使用（应用仅用其做
#       缓存 / 限流 / 企微 token 暂存等 KV 操作）。若你其实另有独立 Redis，请更正。
redis:
  host: 10.156.133.79            # ✅ 来自 falkordb 端点
  port: 30869                    # ✅ 来自 falkordb 端点
  database: 1                    # 使用的库序号（默认 1）
  password: ""                   # ✅ 无密码

# ------------------------------------------------------------------ Milvus 向量库（AI 知识库需要）
# 若暂不使用 AI 知识库检索功能，可先忽略；使用时必须可连通。
milvus:
  host: 10.156.133.79            # ✅ K8s 节点地址（NodePort 暴露）
  port: 31872                    # ✅ NodePort（集群内服务端口 19530 → 节点端口 31872）
  collectionName: iyque_vectors  # 向量集合名（默认）
  dimension: 4096                # 向量维度（需与 Qwen3-Embedding-8B 输出一致 = 4096）
  score: 0.5                     # 相似度阈值（默认 0.5）

# ------------------------------------------------------------------ 大模型 / 向量模型（OpenAI 兼容协议）
# 默认接入智谱开放平台（GLM-4 对话 + embedding-3 向量）。
# 若使用其它 OpenAI 兼容服务，替换 base-url / model 即可。
ai:
  chat:                          # 对话模型
    model-name: zai-org/GLM-5.2-FP8
    base-url: http://localhost:7999   # ✅ 本地/自建 OpenAI 兼容服务
    api-key: dummy                     # ✅ 本地服务占位 Key
  embedding:                     # 向量模型
    model-name: Qwen/Qwen3-Embedding-8B-Alt
    base-url: http://localhost:7999   # ✅ 本地/自建 OpenAI 兼容服务
    api-key: dummy                     # ✅ 本地服务占位 Key

# ------------------------------------------------------------------ 管理端默认账号
# ⚠️ 请务必修改默认账号密码，勿使用源码示例值。
admin:
  userName: eyanpen             # ✅ 已提供
  password: okswordsman         # ✅ 已提供

# ------------------------------------------------------------------ 文件与访问地址
app:
  uploadDir: ./upload            # 文件上传目录
  fileViewUrl: http://10.210.156.69:8085/file/fileView/   # ✅ 已提供（已修正原输入中重复的 http://）

# ------------------------------------------------------------------ 企业微信（登录管理端后在页面配置，非文件）
# 以下参数不写在配置文件中，而是部署完成、登录管理端后在"配置"页面填写，
# 数据保存在数据库表 iyque_config。此处仅作清单提示，安装时无需填写：
#   - corpId          企业 ID
#   - agentId         自建应用 AgentId
#   - agentSecert     自建应用 Secret
#   - token           回调验签 Token
#   - encodingAESKey  回调消息加解密 Key
#   - 回调地址        https://<你的域名>/iyque/iycallback/handle （需 HTTPS 且公网可达）
#   - （可选）会话存档：msgAuditLibPath / msgAuditSecret / msgAuditPriKey
